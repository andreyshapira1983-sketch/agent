<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Tool Tester — Все 45 инструментов</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0d0d17; color: #e0e0f0; min-height: 100vh; }

/* HEADER */
#header { background: #12122a; border-bottom: 1px solid #2a2a5a; padding: 16px 24px; display: flex; align-items: center; gap: 14px; position: sticky; top: 0; z-index: 100; }
#header h1 { font-size: 20px; font-weight: 700; }
#header .subtitle { font-size: 13px; color: #888; margin-left: auto; }
#conn-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
#conn-dot.online { background: #4ade80; }
#conn-text { font-size: 13px; color: #888; }

/* STATS BAR */
#stats { background: #0f0f22; border-bottom: 1px solid #1e1e3a; padding: 10px 24px; display: flex; gap: 24px; font-size: 13px; color: #888; }
.stat { display: flex; align-items: center; gap: 6px; }
.stat b { color: #e0e0f0; font-size: 16px; }
.stat.pass { color: #4ade80; }
.stat.fail { color: #f87171; }
.stat.skip { color: #fbbf24; }
.stat.pending { color: #888; }
.tool-name { font-size: 12px; color: #888; }

/* TOOLBAR */
#toolbar { padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid #1e1e3a; }
.filter-btn { background: #1e1e3a; border: 1px solid #2a2a5a; color: #aaa; border-radius: 20px; padding: 5px 14px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.filter-btn:hover, .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; }
#run-all-btn { margin-left: auto; background: #16a34a; border: none; color: #fff; border-radius: 8px; padding: 8px 20px; font-size: 14px; font-weight: 600; cursor: pointer; }
#run-all-btn:hover { background: #15803d; }
#run-all-btn:disabled { background: #334; cursor: default; }
#token-input { background: #1e1e3a; border: 1px solid #2a2a5a; color: #e0e0f0; border-radius: 8px; padding: 7px 12px; font-size: 13px; width: 220px; outline: none; }
#token-input:focus { border-color: #2563eb; }
#token-input::placeholder { color: #666; }

/* GRID */
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; padding: 16px 24px; }

/* CARD */
.card { background: #12122a; border: 1px solid #2a2a5a; border-radius: 12px; overflow: hidden; transition: border-color 0.15s; }
.card:hover { border-color: #3a3a7a; }
.card.pass { border-color: #16a34a; }
.card.fail { border-color: #dc2626; }
.card.skip { border-color: #d97706; opacity: 0.75; }
.card.running { border-color: #3b82f6; animation: pulse-border 1s ease-in-out infinite; }
@keyframes pulse-border { 0%,100% { border-color: #3b82f6; } 50% { border-color: #60a5fa; } }

.card-header { padding: 10px 14px; display: flex; align-items: center; gap: 10px; background: #0f0f20; border-bottom: 1px solid #1e1e3a; }
.card-icon { font-size: 20px; flex-shrink: 0; }
.card-title { font-size: 14px; font-weight: 600; flex: 1; }
.card-badge { font-size: 10px; background: #1e1e3a; border: 1px solid #2a2a5a; border-radius: 4px; padding: 2px 6px; color: #888; }
.card-badge.cat-system { background: #1e2a1e; border-color: #16a34a; color: #4ade80; }
.card-badge.cat-ai { background: #1e1e2a; border-color: #6366f1; color: #818cf8; }
.card-badge.cat-docs { background: #2a1e1e; border-color: #dc2626; color: #f87171; }
.card-badge.cat-net { background: #1e2a2a; border-color: #0891b2; color: #22d3ee; }
.card-badge.cat-os { background: #2a2a1e; border-color: #d97706; color: #fbbf24; }
.card-badge.cat-data { background: #2a1e2a; border-color: #9333ea; color: #c084fc; }
.card-badge.cat-ext { background: #2a2a2a; border-color: #6b7280; color: #9ca3af; }

.status-icon { font-size: 16px; margin-left: auto; }

.card-body { padding: 10px 14px; }
.desc { font-size: 12px; color: #888; margin-bottom: 8px; line-height: 1.5; }
.test-cmd { background: #080818; border: 1px solid #1e1e3a; border-radius: 6px; padding: 6px 10px; font-size: 11px; font-family: monospace; color: #a5f3fc; margin-bottom: 8px; line-height: 1.6; word-break: break-all; }

.card-actions { display: flex; gap: 6px; align-items: center; }
.run-btn { background: #2563eb; border: none; color: #fff; border-radius: 6px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; }
.run-btn:hover { background: #1d4ed8; }
.run-btn:disabled { background: #334; cursor: default; }
.edit-btn { background: #1e1e3a; border: 1px solid #2a2a5a; color: #888; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; }
.edit-btn:hover { border-color: #4a4a8a; color: #e0e0f0; }

.result-box { margin-top: 10px; background: #080818; border: 1px solid #1e1e3a; border-radius: 6px; padding: 8px 10px; font-size: 11px; font-family: monospace; line-height: 1.6; max-height: 160px; overflow-y: auto; display: none; word-break: break-all; white-space: pre-wrap; }
.result-box.show { display: block; }
.result-box.ok { border-color: #16a34a; color: #4ade80; }
.result-box.err { border-color: #dc2626; color: #f87171; }
.result-box.warn { border-color: #d97706; color: #fbbf24; }

.latency { font-size: 10px; color: #666; margin-left: auto; }

/* EDIT MODAL */
#edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
#edit-modal.show { display: flex; }
.modal-box { background: #12122a; border: 1px solid #3a3a6a; border-radius: 14px; padding: 24px; width: 520px; max-width: 95vw; display: flex; flex-direction: column; gap: 14px; }
.modal-box h2 { font-size: 16px; font-weight: 700; }
.modal-box textarea { background: #080818; border: 1px solid #2a2a5a; color: #a5f3fc; border-radius: 8px; padding: 10px; font-size: 12px; font-family: monospace; height: 120px; resize: vertical; outline: none; }
.modal-box textarea:focus { border-color: #3b82f6; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btns button { border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
.btn-save { background: #2563eb; color: #fff; }
.btn-cancel { background: #1e1e3a; color: #aaa; }

/* SCROLL */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #0d0d17; }
::-webkit-scrollbar-thumb { background: #2a2a5a; border-radius: 3px; }
</style>
</head>

<div id="grid"></div>

    </div>
  </div>
</div>

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const results = {};       // id → {status, output, latency}
const customCmds = {};    // id → override command
let activeFilter = 'all';
let editingId = null;
const AGENT_URL = 'http://localhost:8000';

// ══════════════════════════════════════════════════════════════
// TOKEN
// ══════════════════════════════════════════════════════════════
function getToken() {
  const saved = localStorage.getItem('agent_token') || '';
  const input = document.getElementById('token-input').value.trim();
  return input || saved ||
    document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('agent_token='))?.split('=')[1] || '';
}
function saveToken(v) { if(v) localStorage.setItem('agent_token',v); }

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('agent_token') || '';
  if(saved) document.getElementById('token-input').value = saved;
  renderGrid();
  checkConnection();
  setInterval(checkConnection, 8000);
});

// ══════════════════════════════════════════════════════════════
// CONNECTION CHECK
// ══════════════════════════════════════════════════════════════
async function checkConnection() {
  const dot = document.getElementById('conn-dot');
  const txt = document.getElementById('conn-text');
  try {
    const r = await fetch(AGENT_URL + '/status', {
      headers: {'X-Agent-Token': getToken()},
      signal: AbortSignal.timeout(3000)
    });
    if(r.status === 401) {
      dot.className = '';
      txt.textContent = '🔑 Нужен токен (введи WEB_TOKEN из .env)';
    } else if(r.ok) {
      const d = await r.json();
      dot.className = 'online';
      txt.textContent = `Агент онлайн · цикл #${d.cycle||0}`;
    } else {
      throw new Error(r.status);
    }
  } catch(e) {
    dot.className = '';
    txt.textContent = 'Агент офлайн — запусти: python agent.py --bot';
  }
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = activeFilter === 'all' ? TOOLS : TOOLS.filter(t => t.cat === activeFilter);
  document.getElementById('s-total').textContent = filtered.length;

  filtered.forEach(tool => {
    const r = results[tool.id];
    let cardClass = '';
    let statusIcon = '⏳';
    if(r) {
      if(r.status === 'pass') { cardClass = 'pass'; statusIcon = '✅'; }
      else if(r.status === 'fail') { cardClass = 'fail'; statusIcon = '❌'; }
      else if(r.status === 'skip') { cardClass = 'skip'; statusIcon = '⚠️'; }
      else if(r.status === 'running') { cardClass = 'running'; statusIcon = '⏳'; }
    }
    const cmd = customCmds[tool.id] || tool.cmd;
    const resultShow = r && r.output ? 'show' : '';
    const resultClass = !r ? '' : r.status === 'pass' ? 'ok' : r.status === 'skip' ? 'warn' : 'err';
    const latency = r && r.latency ? `${r.latency}ms` : '';
    const outputHtml = r && r.output
      ? escHtml(r.output).replace(/OK|✓|success|найден/gi, m=>`<span style="color:#4ade80">${m}</span>`)
             .replace(/не установлен|MISSING|НЕ ЗАДАН|НЕ НАЙДЕН/gi, m=>`<span style="color:#fbbf24">${m}</span>`)
             .replace(/Error|Ошибка|FAIL|fail/gi, m=>`<span style="color:#f87171">${m}</span>`)
      : '';

    grid.innerHTML += `
    <div class="card ${cardClass}" id="card-${tool.id}">
      <div class="card-header">
        <span class="card-icon">${tool.icon}</span>
        <div>
          <div class="card-title">${tool.name}</div>
        </div>
        <span class="card-badge cat-${tool.cat}">${tool.catLabel}</span>
        <span class="status-icon">${statusIcon}</span>
      </div>
      <div class="card-body">
        <div class="desc">${tool.desc}</div>
        <div class="test-cmd" id="cmd-${tool.id}">${escHtml(cmd)}</div>
        <div class="card-actions">
          <button class="run-btn" onclick="runTool('${tool.id}')" id="btn-${tool.id}">▶ Тест</button>
          <button class="edit-btn" onclick="openModal('${tool.id}')">✏️</button>
          ${latency ? `<span class="latency">${latency}</span>` : ''}
        </div>
        <div class="result-box ${resultClass} ${resultShow}" id="res-${tool.id}">${outputHtml}</div>
      </div>
    </div>`;
  });
  updateStats();
}

// ══════════════════════════════════════════════════════════════
// RUN SINGLE TOOL
// ══════════════════════════════════════════════════════════════
async function runTool(id) {
  const tool = TOOLS.find(t => t.id === id);
  if(!tool) return;

  const btn = document.getElementById(`btn-${id}`);
  const card = document.getElementById(`card-${id}`);
  const resBox = document.getElementById(`res-${id}`);

  btn.disabled = true;
  btn.textContent = '⏳';
  card.className = 'card running';
  results[id] = {status:'running', output:'Выполняется...', latency:0};
  resBox.className = 'result-box show';
  resBox.innerHTML = '<span style="color:#888">Выполняется...</span>';

  const cmd = customCmds[id] || tool.cmd;
  const t0 = Date.now();
  try {
    const tok = getToken();
    const resp = await fetch(AGENT_URL + '/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Agent-Token': tok,
      },
      body: JSON.stringify({ message: cmd }),
      signal: AbortSignal.timeout(30000),
    });
    const latency = Date.now() - t0;
    if(resp.status === 401) {
      results[id] = {status:'fail', output:'❌ Ошибка авторизации — введи WEB_TOKEN', latency};
    } else {
      const data = await resp.json();
      const reply = (data.reply || data.result || data.error || JSON.stringify(data)).trim();
      const lower = reply.toLowerCase();
      let status = 'pass';
      if(!resp.ok || lower.includes('ошибка') || lower.includes('error') || lower.includes('traceback') || lower.includes('exception')) {
        status = 'fail';
      } else if(lower.includes('не установлен') || lower.includes('не найден') || lower.includes('missing') || lower.includes('не задан')) {
        status = 'skip';
      }
      results[id] = {status, output:reply, latency};
    }
  } catch(e) {
    const latency = Date.now() - t0;
    if(e.name === 'TimeoutError') {
      results[id] = {status:'fail', output:'❌ Таймаут 30с — агент не ответил', latency};
    } else {
      results[id] = {status:'fail', output:`❌ Нет соединения: ${e.message}\nЗапусти агента: python agent.py --bot`, latency};
    }
  }
  btn.disabled = false;
  btn.textContent = '▶ Тест';
  renderCard(id);
  updateStats();
}

function renderCard(id) {
  const tool = TOOLS.find(t=>t.id===id);
  const r = results[id];
  const card = document.getElementById(`card-${id}`);
  const resBox = document.getElementById(`res-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  if(!tool||!r) return;

  const cl = r.status==='pass'?'pass':r.status==='skip'?'skip':r.status==='running'?'running':'fail';
  card.className = `card ${cl}`;
  const icon = r.status==='pass'?'✅':r.status==='skip'?'⚠️':r.status==='running'?'⏳':'❌';
  card.querySelector('.status-icon').textContent = icon;

  const rcl = r.status==='pass'?'ok':r.status==='skip'?'warn':'err';
  resBox.className = `result-box ${rcl} show`;
  const out = escHtml(r.output||'')
    .replace(/OK|✓|success|найден/gi, m=>`<span style="color:#4ade80">${m}</span>`)
    .replace(/не установлен|MISSING|НЕ ЗАДАН|НЕ НАЙДЕН/gi, m=>`<span style="color:#fbbf24">${m}</span>`)
    .replace(/Error|Ошибка|FAIL/gi, m=>`<span style="color:#f87171">${m}</span>`);
  resBox.innerHTML = out;
  if(r.latency) {
    let latEl = card.querySelector('.latency');
    if(!latEl) { latEl = document.createElement('span'); latEl.className='latency'; card.querySelector('.card-actions').appendChild(latEl); }
    latEl.textContent = r.latency + 'ms';
  }
}

// ══════════════════════════════════════════════════════════════
// RUN ALL
// ══════════════════════════════════════════════════════════════
async function runAll() {
  const btn = document.getElementById('run-all-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Запуск...';
  const visible = activeFilter === 'all' ? TOOLS : TOOLS.filter(t=>t.cat===activeFilter);
  for(const tool of visible) {
    await runTool(tool.id);
    await sleep(400);   // пауза между запросами
  }
  btn.disabled = false;
  btn.textContent = '▶ Запустить все';
}
const sleep = ms => new Promise(r=>setTimeout(r,ms));

// ══════════════════════════════════════════════════════════════
// STATS
// ══════════════════════════════════════════════════════════════
function updateStats() {
  const visible = activeFilter==='all' ? TOOLS : TOOLS.filter(t=>t.cat===activeFilter);
  const pass  = visible.filter(t=>results[t.id]?.status==='pass').length;
  const fail  = visible.filter(t=>results[t.id]?.status==='fail').length;
  const skip  = visible.filter(t=>results[t.id]?.status==='skip').length;
  const pend  = visible.filter(t=>!results[t.id]||results[t.id].status==='pending').length;
  document.getElementById('s-total').textContent = visible.length;
  document.getElementById('s-pass').textContent = pass;
  document.getElementById('s-fail').textContent = fail;
  document.getElementById('s-skip').textContent = skip;
  document.getElementById('s-pending').textContent = pend;
}

// ══════════════════════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════════════════════
function setFilter(cat, el) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ══════════════════════════════════════════════════════════════
// EDIT MODAL
// ══════════════════════════════════════════════════════════════
function openModal(id) {
  editingId = id;
  const tool = TOOLS.find(t=>t.id===id);
  document.getElementById('modal-tool-name').textContent = `Инструмент: ${tool?.name || id}`;
  document.getElementById('modal-textarea').value = customCmds[id] || tool?.cmd || '';
  document.getElementById('edit-modal').className = 'show';
}
function closeModal() {
  document.getElementById('edit-modal').className = '';
  editingId = null;
}
function saveModal() {
  if(!editingId) return;
  customCmds[editingId] = document.getElementById('modal-textarea').value;
  closeModal();
  renderGrid();
}
document.getElementById('edit-modal').addEventListener('click', e => {
  if(e.target === document.getElementById('edit-modal')) closeModal();
});

// ══════════════════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
