name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests + supply-chain guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hash-locked dependencies
        # --require-hashes fails the build if any dependency is not pinned with
        # a verified hash in requirements.lock (generated by pip-compile
        # --generate-hashes). This is the "hash-locked dependencies" guarantee.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Run tests
        run: python -m pytest -q

      - name: Release / supply-chain gate
        # Deterministic, no API keys required. Exits non-zero if the release
        # manifest leaks local secrets or the supply-chain audit fails.
        run: python scripts/audit_release.py

      - name: Verify SBOM is in sync
        # Fails if sbom.cdx.json drifts from requirements.lock, keeping the
        # software bill of materials honest on every change.
        run: python scripts/generate_sbom.py --check
