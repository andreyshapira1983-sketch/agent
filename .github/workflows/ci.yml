name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests + supply-chain guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks scans past commits, not just the latest diff

      - name: Secret scan (gitleaks)
        # Scans git history + diffs for leaked credentials (OpenAI, Anthropic,
        # AWS, GitHub PATs, PEM/private keys, …). Orthogonal to the other gates:
        # audit_release checks the release manifest/deps and core/secret_scanner
        # scans runtime content — neither inspects commit history. Fails the
        # build on any finding. Placed first so a leak fails fast.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install hash-locked dependencies
        # --require-hashes fails the build if any dependency is not pinned with
        # a verified hash in requirements.lock (generated by pip-compile
        # --generate-hashes). This is the "hash-locked dependencies" guarantee.
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Verify dependency tree is consistent
        # Fails if the installed set has conflicting or missing dependencies.
        run: pip check

      - name: Verify SBOM is in sync
        # Fails if sbom.cdx.json drifts from requirements.lock, keeping the
        # software bill of materials honest on every change.
        run: python scripts/generate_sbom.py --check

      - name: Release / supply-chain gate
        # Deterministic, no API keys required. Exits non-zero if the release
        # manifest leaks local secrets or the supply-chain audit fails.
        run: python scripts/audit_release.py

      - name: Run tests with branch coverage
        run: coverage run --branch -m pytest

      - name: Coverage report (fail under threshold)
        # Enforces the minimum branch-coverage bar; fails the build below 85%.
        run: coverage report --fail-under=85
