  <path d="M165 586 L165 630" class="arrow"/>
  <path d="M415 586 L415 630" class="arrow"/>
  <path d="M415 706 L415 750" class="arrow"/>
  <path d="M165 706 L165 750" class="arrow"/>
  <path d="M270 788 L310 788" class="arrow"/>

  <!-- dispatch to workers -->
  <path d="M520 308 L620 210" class="arrow"/>
  <path d="M520 308 L840 210" class="arrow"/>
  <path d="M520 308 L620 330" class="arrow"/>
  <path d="M520 308 L840 330" class="arrow"/>
  <path d="M520 308 L620 450" class="arrow"/>
  <path d="M520 308 L840 450" class="arrow"/>

  <!-- workers to broker -->
  <path d="M800 210 L1150 210" class="arrow"/>
  <path d="M1020 210 L1150 210" class="arrow"/>
