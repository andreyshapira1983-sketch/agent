
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1600" viewBox="0 0 2200 1600">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #111; }
      .subtitle { font: 600 16px Arial, sans-serif; fill: #333; }
      .box { fill: #f8f9fb; stroke: #2f3b52; stroke-width: 2; rx: 14; ry: 14; }
      .plane { fill: #eef3ff; stroke: #6b7a99; stroke-width: 2; rx: 22; ry: 22; }
      .warn { fill: #fff5e8; stroke: #aa6a00; stroke-width: 2; rx: 14; ry: 14; }
      .data { fill: #eefaf0; stroke: #3b7a4b; stroke-width: 2; rx: 14; ry: 14; }
      .exec { fill: #f3efff; stroke: #6554a3; stroke-width: 2; rx: 14; ry: 14; }
      .obs { fill: #f4fbff; stroke: #2b7da7; stroke-width: 2; rx: 14; ry: 14; }
      .txt { font: 14px Arial, sans-serif; fill: #111; }
      .small { font: 12px Arial, sans-serif; fill: #222; }
      .planeLabel { font: 700 20px Arial, sans-serif; fill: #223; }
      .arrow { stroke: #333; stroke-width: 2.3; fill: none; marker-end: url(#m); }
      .dashed { stroke-dasharray: 8 6; }
      .danger { stroke: #aa6a00; }
      .memory { stroke: #2d6b3c; }
      .muted { fill: #555; font: 12px Arial, sans-serif; }
    </style>
    <marker id="m" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="40" y="40" class="title">Целевая техническая архитектура автономного AI-агента (локальный ПК, multi-worker, API-first)</text>
  <text x="40" y="68" class="subtitle">Control plane • Worker plane • Tool/Execution plane • Data plane • Safety gates • Memory write-back</text>

  <!-- Planes -->
  <rect x="30" y="100" width="520" height="1360" class="plane"/>
  <text x="50" y="130" class="planeLabel">1. Edge + Control Plane</text>

  <rect x="580" y="100" width="500" height="760" class="plane"/>
  <text x="600" y="130" class="planeLabel">2. Worker Plane</text>

  <rect x="1110" y="100" width="510" height="760" class="plane"/>
  <text x="1130" y="130" class="planeLabel">3. Tool / Execution Plane</text>

  <rect x="1650" y="100" width="510" height="760" class="plane"/>
  <text x="1670" y="130" class="planeLabel">4. Data + Model Plane</text>

  <rect x="580" y="900" width="1580" height="560" class="plane"/>
  <text x="600" y="930" class="planeLabel">5. Observability / Security / Policy / Approval / Runtime Feedback</text>

  <!-- Control plane boxes -->
  <rect x="60" y="160" width="210" height="70" class="box"/>
  <text x="80" y="188" class="txt">External API Client</text>
  <text x="80" y="208" class="small">единственная точка входа</text>

  <rect x="310" y="160" width="210" height="70" class="box"/>
  <text x="335" y="188" class="txt">API Gateway</text>
  <text x="325" y="208" class="small">auth, rate limit, normalize</text>

  <rect x="60" y="270" width="210" height="76" class="box"/>
  <text x="84" y="298" class="txt">Session &amp; State Service</text>
  <text x="86" y="318" class="small">session, checkpoint, resume</text>
  <text x="88" y="336" class="small">step status, task state</text>

  <rect x="310" y="270" width="210" height="76" class="box"/>
  <text x="352" y="298" class="txt">Orchestrator</text>
  <text x="334" y="318" class="small">manager agent / workflow owner</text>
  <text x="350" y="336" class="small">dispatch &amp; coordination</text>

  <rect x="60" y="390" width="210" height="76" class="box"/>
  <text x="84" y="418" class="txt">Task Decomposition</text>
  <text x="100" y="438" class="small">subtasks, DAG, dependencies</text>
  <text x="126" y="456" class="small">priorities</text>

  <rect x="310" y="390" width="210" height="76" class="box"/>
  <text x="352" y="418" class="txt">Planner /</text>
  <text x="336" y="438" class="txt">Cognitive Core</text>
  <text x="332" y="456" class="small">reasoning, strategy, plan</text>

  <rect x="60" y="510" width="210" height="76" class="warn"/>
  <text x="102" y="538" class="txt">Policy Engine</text>
  <text x="90" y="558" class="small">allowed / guarded / denied</text>
  <text x="95" y="576" class="small">tool/action classification</text>

  <rect x="310" y="510" width="210" height="76" class="warn"/>
  <text x="336" y="538" class="txt">Risk &amp; Budget Engine</text>
  <text x="337" y="558" class="small">cost, latency, danger, SLA</text>
  <text x="355" y="576" class="small">fallback policy</text>

  <rect x="60" y="630" width="210" height="76" class="warn"/>
  <text x="88" y="658" class="txt">Human Approval Service</text>
  <text x="76" y="678" class="small">только dangerous actions</text>
  <text x="76" y="696" class="small">delete/write/pay/config mutate</text>

  <rect x="310" y="630" width="210" height="76" class="box"/>
  <text x="355" y="658" class="txt">Result Collector</text>
  <text x="330" y="678" class="small">normalize outputs, unify status</text>
  <text x="338" y="696" class="small">prepare evaluation input</text>

  <rect x="60" y="750" width="210" height="76" class="box"/>
  <text x="99" y="778" class="txt">Validation Layer</text>
  <text x="80" y="798" class="small">schema checks, contracts, data QA</text>
  <text x="85" y="816" class="small">safe memory write pre-check</text>

  <rect x="310" y="750" width="210" height="76" class="box"/>
  <text x="345" y="778" class="txt">Memory Router</text>
  <text x="322" y="798" class="small">classify to session / episodic</text>
  <text x="334" y="816" class="small">semantic / graph / artifacts</text>

  <rect x="60" y="870" width="460" height="130" class="box"/>
  <text x="84" y="898" class="txt">Runtime sequence</text>
  <text x="84" y="920" class="small">1 receive → 2 restore state → 3 retrieve context → 4 decompose → 5 plan</text>
  <text x="84" y="942" class="small">6 policy/risk check → 7 approval if dangerous → 8 dispatch → 9 execute</text>
  <text x="84" y="964" class="small">10 validate → 11 evaluate → 12 write memory → 13 respond</text>

  <!-- Worker plane -->
  <rect x="620" y="170" width="180" height="80" class="box"/>
  <text x="656" y="200" class="txt">Research Worker</text>
  <text x="650" y="220" class="small">search / retrieve / source</text>
  <text x="679" y="238" class="small">analysis</text>

  <rect x="840" y="170" width="180" height="80" class="box"/>
  <text x="883" y="200" class="txt">Coder Worker</text>
  <text x="863" y="220" class="small">code / tests / patches</text>
  <text x="866" y="238" class="small">repo operations</text>

  <rect x="620" y="290" width="180" height="80" class="box"/>
  <text x="664" y="320" class="txt">Analyst Worker</text>
  <text x="648" y="340" class="small">data reasoning / reports</text>
  <text x="676" y="358" class="small">metrics</text>

  <rect x="840" y="290" width="180" height="80" class="box"/>
  <text x="872" y="320" class="txt">Browser Worker</text>
  <text x="857" y="340" class="small">web navigation / extract</text>
  <text x="866" y="358" class="small">scrape in policy</text>

  <rect x="620" y="410" width="180" height="80" class="box"/>
  <text x="656" y="440" class="txt">Executor Worker</text>
  <text x="655" y="460" class="small">approved mutable actions</text>
  <text x="660" y="478" class="small">filesystem / db / ops</text>

  <rect x="840" y="410" width="180" height="80" class="box"/>
  <text x="856" y="440" class="txt">Evaluation Worker</text>
  <text x="853" y="460" class="small">reflection / QA / scoring</text>
  <text x="858" y="478" class="small">lessons learned</text>

  <rect x="620" y="540" width="400" height="120" class="warn"/>
  <text x="646" y="570" class="txt">Worker rules</text>
  <text x="646" y="592" class="small">• workers do not touch external systems directly</text>
  <text x="646" y="614" class="small">• all tool usage goes through Tool Broker</text>
  <text x="646" y="636" class="small">• mutable actions require policy clearance; dangerous ones require human approval</text>

  <!-- Tool plane -->
  <rect x="1150" y="170" width="210" height="90" class="exec"/>
  <text x="1206" y="202" class="txt">Tool Broker</text>
  <text x="1172" y="224" class="small">tool auth, routing, timeout, retry</text>
  <text x="1170" y="244" class="small">audit, secret injection, isolation</text>

  <rect x="1400" y="170" width="180" height="80" class="exec"/>
  <text x="1432" y="200" class="txt">Python Sandbox</text>
  <text x="1436" y="220" class="small">isolated runtime</text>
  <text x="1435" y="238" class="small">bounded resources</text>

  <rect x="1150" y="290" width="180" height="80" class="exec"/>
  <text x="1194" y="320" class="txt">Terminal Runner</text>
  <text x="1176" y="340" class="small">scoped shell execution</text>
  <text x="1192" y="358" class="small">limited profile</text>

  <rect x="1370" y="290" width="210" height="80" class="exec"/>
  <text x="1411" y="320" class="txt">Filesystem Adapter</text>
  <text x="1400" y="340" class="small">read/write scoped paths only</text>
  <text x="1431" y="358" class="small">artifact movement</text>

  <rect x="1150" y="410" width="180" height="80" class="exec"/>
  <text x="1184" y="440" class="txt">Browser Runtime</text>
  <text x="1187" y="460" class="small">Playwright container</text>
  <text x="1205" y="478" class="small">network policy</text>

  <rect x="1370" y="410" width="210" height="80" class="exec"/>
  <text x="1431" y="440" class="txt">Docker Sandbox</text>
  <text x="1418" y="460" class="small">job containers / isolation</text>
  <text x="1418" y="478" class="small">cpu/ram/net constraints</text>

  <rect x="1150" y="530" width="180" height="80" class="exec"/>
  <text x="1205" y="560" class="txt">GitHub Adapter</text>
  <text x="1178" y="580" class="small">repo / issue / PR access</text>
  <text x="1200" y="598" class="small">scoped token use</text>

  <rect x="1370" y="530" width="210" height="80" class="exec"/>
  <text x="1426" y="560" class="txt">DB / Cloud Adapters</text>
  <text x="1400" y="580" class="small">database access / cloud APIs</text>
  <text x="1420" y="598" class="small">policy-governed mutations</text>

  <rect x="1150" y="650" width="430" height="120" class="warn"/>
  <text x="1174" y="680" class="txt">Dangerous actions (approval required)</text>
  <text x="1174" y="702" class="small">• deleting important files • mutating production DB • external writes • payments</text>
  <text x="1174" y="724" class="small">• architecture/config changes • high-impact cloud operations • irreversible batch actions</text>
  <text x="1174" y="746" class="small">Safe read-only and bounded sandbox tasks can run automatically after policy check</text>

  <!-- Data plane -->
  <rect x="1690" y="160" width="190" height="80" class="data"/>
  <text x="1756" y="190" class="txt">Postgres</text>
  <text x="1712" y="210" class="small">sessions, tasks, approvals</text>
  <text x="1733" y="228" class="small">audit metadata</text>

  <rect x="1920" y="160" width="190" height="80" class="data"/>
  <text x="1990" y="190" class="txt">Redis</text>
  <text x="1945" y="210" class="small">cache, locks, queues</text>
  <text x="1947" y="228" class="small">coordination state</text>

  <rect x="1690" y="280" width="190" height="80" class="data"/>
  <text x="1743" y="310" class="txt">Qdrant /</text>
  <text x="1713" y="330" class="txt">Weaviate / Chroma</text>
  <text x="1718" y="348" class="small">vector memory / retrieval</text>

  <rect x="1920" y="280" width="190" height="80" class="data"/>
  <text x="1985" y="310" class="txt">Neo4j</text>
  <text x="1945" y="330" class="small">knowledge graph</text>
  <text x="1954" y="348" class="small">entities/relations</text>

  <rect x="1690" y="400" width="190" height="80" class="data"/>
  <text x="1752" y="430" class="txt">MinIO / S3</text>
  <text x="1712" y="450" class="small">documents, artifacts, files</text>
  <text x="1727" y="468" class="small">parsed content store</text>

  <rect x="1920" y="400" width="190" height="80" class="box"/>
  <text x="1963" y="430" class="txt">Model Router</text>
  <text x="1940" y="450" class="small">select model by task/budget</text>
  <text x="1958" y="468" class="small">fallback strategy</text>

  <rect x="1690" y="520" width="420" height="120" class="data"/>
  <text x="1714" y="550" class="txt">Memory write policy</text>
  <text x="1714" y="572" class="small">session state ← current step context</text>
  <text x="1714" y="594" class="small">episodic memory ← executed actions + results + failures</text>
  <text x="1714" y="616" class="small">semantic memory ← verified facts only</text>
  <text x="1714" y="638" class="small">knowledge graph ← extracted entities/relations after validation</text>

  <!-- Observability/Security plane -->
  <rect x="620" y="970" width="220" height="90" class="obs"/>
  <text x="665" y="1002" class="txt">Monitoring / Metrics</text>
  <text x="655" y="1024" class="small">health, latency, costs, errors</text>
  <text x="702" y="1044" class="small">SLA trends</text>

  <rect x="880" y="970" width="220" height="90" class="obs"/>
  <text x="948" y="1002" class="txt">Audit Log</text>
  <text x="914" y="1024" class="small">who requested / approved / ran</text>
  <text x="918" y="1044" class="small">immutable action trace</text>

  <rect x="1140" y="970" width="220" height="90" class="warn"/>
  <text x="1177" y="1002" class="txt">IAM / Access Control</text>
  <text x="1170" y="1024" class="small">worker scopes, roles, permissions</text>
  <text x="1210" y="1044" class="small">authz gates</text>

  <rect x="1400" y="970" width="220" height="90" class="warn"/>
  <text x="1463" y="1002" class="txt">Secrets Vault</text>
  <text x="1438" y="1024" class="small">API keys, tokens, scoped secrets</text>
  <text x="1474" y="1044" class="small">injected only via broker</text>

  <rect x="1660" y="970" width="220" height="90" class="obs"/>
  <text x="1710" y="1002" class="txt">Failure Handling</text>
  <text x="1686" y="1024" class="small">retry, backoff, DLQ, rollback</text>
  <text x="1680" y="1044" class="small">escalation / checkpoint resume</text>

  <rect x="1920" y="970" width="220" height="90" class="obs"/>
  <text x="1975" y="1002" class="txt">Evaluation</text>
  <text x="1944" y="1024" class="small">quality, stability, correctness</text>
  <text x="1980" y="1044" class="small">postmortem</text>

  <rect x="620" y="1100" width="1520" height="150" class="warn"/>
  <text x="646" y="1130" class="txt">Trust boundaries</text>
  <text x="646" y="1154" class="small">Control plane is trusted. Worker plane is partially trusted. Tool/Execution plane is high-risk. External systems are untrusted.</text>
  <text x="646" y="1178" class="small">Workers cannot bypass Tool Broker. Tool Broker cannot bypass Policy/IAM. Mutable actions cannot bypass approval when classified dangerous.</text>
  <text x="646" y="1202" class="small">Long-term knowledge cannot bypass verification and validation before write-back.</text>

  <rect x="620" y="1280" width="1520" height="140" class="obs"/>
  <text x="646" y="1310" class="txt">Recommended local deployment</text>
  <text x="646" y="1334" class="small">Docker containers: api-gateway, orchestrator, planner, policy-engine, approval-service, task-engine, tool-broker, workers, postgres, redis, qdrant, neo4j, minio, sandbox-runner, observability.</text>
  <text x="646" y="1358" class="small">Browser runtime in Playwright container. Python/terminal jobs in isolated sandbox containers with CPU/RAM/network limits.</text>
  <text x="646" y="1382" class="small">Human approval only for dangerous actions; safe read-only analysis and bounded sandbox execution can run automatically.</text>

