  <!-- broker to tool adapters -->
  <path d="M1360 215 L1400 210" class="arrow"/>
  <path d="M1255 260 L1240 290" class="arrow"/>
  <path d="M1360 230 L1370 320" class="arrow"/>
  <path d="M1255 260 L1240 410" class="arrow"/>
  <path d="M1360 245 L1370 450" class="arrow"/>
  <path d="M1255 260 L1240 530" class="arrow"/>
  <path d="M1360 250 L1370 570" class="arrow"/>

  <!-- control/data links -->
  <path d="M270 308 L1690 200" class="arrow memory dashed"/>
  <path d="M270 788 L1690 560" class="arrow memory"/>
  <path d="M520 428 L1690 320" class="arrow memory dashed"/>
  <path d="M520 428 L1920 320" class="arrow memory dashed"/>
  <path d="M520 788 L1690 440" class="arrow memory"/>
  <path d="M520 548 L1920 440" class="arrow dashed"/>
  <path d="M520 548 L1140 1015" class="arrow danger dashed"/>
  <path d="M520 548 L1400 1015" class="arrow danger dashed"/>

  <!-- result + evaluation -->
  <path d="M1360 170 L310 668" class="arrow dashed"/>
  <path d="M1020 450 L310 668" class="arrow dashed"/>
  <path d="M520 668 L840 450" class="arrow dashed"/>
  <path d="M930 490 L1920 1015" class="arrow dashed"/>
  <path d="M2140 1015 L415 788" class="arrow dashed"/>

  <!-- approval loop -->
  <path d="M415 548 L165 668" class="arrow danger"/>
  <path d="M165 630 L1150 710" class="arrow danger dashed"/>

  <!-- observability connections -->
  <path d="M415 668 L620 1015" class="arrow dashed"/>
  <path d="M1255 170 L880 1015" class="arrow dashed"/>
  <path d="M1475 530 L1660 1015" class="arrow dashed"/>
  <path d="M415 308 L1920 200" class="arrow dashed"/>
  <path d="M2140 1015 L840 450" class="arrow dashed"/>

  <!-- legend -->
  <rect x="30" y="1480" width="2130" height="95" class="box"/>
  <text x="50" y="1510" class="txt">Легенда</text>
  <text x="50" y="1534" class="small">Обычные стрелки — основной поток управления. Пунктир — асинхронные / вспомогательные / feedback потоки. Оранжевые блоки — safety/approval gates. Зелёные — хранилища. Фиолетовые — исполнение и sandbox.</text>
  <text x="50" y="1558" class="small">Главное правило: API → Orchestrator → Planner → Policy/Risk → (Approval if dangerous) → Worker → Tool Broker → Sandbox/Adapter → Result → Validation/Evaluation → Memory write-back.</text>
</svg>
